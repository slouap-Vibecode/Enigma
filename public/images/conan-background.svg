<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Conan Edogawa character illustration -->

  <!-- Face -->
  <circle cx="200" cy="180" r="45" fill="#F4CBA6" stroke="#E6B893" stroke-width="2"/>

  <!-- Hair -->
  <path d="M160 150 Q200 120 240 150 Q235 140 200 135 Q165 140 160 150" fill="#2C1B0E"/>
  <path d="M170 145 Q180 140 190 145" fill="#2C1B0E"/>
  <path d="M210 145 Q220 140 230 145" fill="#2C1B0E"/>

  <!-- Glasses frame -->
  <circle cx="185" cy="175" r="18" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <circle cx="215" cy="175" r="18" fill="none" stroke="#2C3E50" stroke-width="3"/>
  <line x1="203" y1="175" x2="197" y2="175" stroke="#2C3E50" stroke-width="2"/>

  <!-- Eyes -->
  <circle cx="185" cy="175" r="12" fill="#FFFFFF"/>
  <circle cx="215" cy="175" r="12" fill="#FFFFFF"/>
  <circle cx="188" cy="175" r="8" fill="#4A90E2"/>
  <circle cx="218" cy="175" r="8" fill="#4A90E2"/>
  <circle cx="190" cy="173" r="4" fill="#1E3A8A"/>
  <circle cx="220" cy="173" r="4" fill="#1E3A8A"/>

  <!-- Nose -->
  <ellipse cx="200" cy="185" rx="2" ry="3" fill="#E6B893"/>

  <!-- Mouth (open in surprise/speaking) -->
  <ellipse cx="200" cy="195" rx="8" ry="12" fill="#FF6B9D"/>
  <ellipse cx="200" cy="195" rx="6" ry="10" fill="#FFFFFF"/>

  <!-- Bow tie -->
  <polygon points="200,210 185,220 185,235 215,235 215,220" fill="#FF4444"/>
  <polygon points="190,227 210,227 200,220" fill="#CC3333"/>

  <!-- Shirt -->
  <rect x="170" y="235" width="60" height="80" fill="#FFFFFF"/>
  <rect x="175" y="240" width="50" height="70" fill="#E8F4FD"/>

  <!-- Jacket -->
  <path d="M160 250 Q200 240 240 250 L240 330 Q200 340 160 330 Z" fill="#2E5BC7"/>
  <rect x="180" y="260" width="40" height="60" fill="#FFFFFF"/>

  <!-- Pointing arm and hand -->
  <ellipse cx="280" cy="280" rx="15" ry="35" fill="#F4CBA6" transform="rotate(30 280 280)"/>
  <!-- Hand pointing -->
  <circle cx="300" cy="260" r="12" fill="#F4CBA6"/>
  <rect x="305" y="255" width="20" height="5" fill="#F4CBA6"/>
  <circle cx="325" cy="257" r="3" fill="#F4CBA6"/>

  <!-- Other arm -->
  <ellipse cx="120" cy="280" rx="15" ry="35" fill="#F4CBA6" transform="rotate(-30 120 280)"/>
  <circle cx="100" cy="300" r="10" fill="#F4CBA6"/>

  <!-- Expression lines (action lines) -->
  <line x1="340" y1="240" x2="360" y2="230" stroke="#FF4444" stroke-width="3"/>
  <line x1="340" y1="250" x2="365" y2="245" stroke="#FF4444" stroke-width="2"/>
  <line x1="340" y1="260" x2="355" y2="255" stroke="#FF4444" stroke-width="2"/>

  <!-- Detective badge on jacket -->
  <circle cx="190" cy="270" r="8" fill="#FFD700"/>
  <text x="190" y="275" text-anchor="middle" fill="#2C3E50" font-size="8" font-weight="bold">🔍</text>
</svg>